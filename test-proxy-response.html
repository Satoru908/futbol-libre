<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Proxy Response</title>
  <style>
    body {
      font-family: monospace;
      padding: 20px;
      background: #1e1e1e;
      color: #d4d4d4;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    button {
      padding: 10px 20px;
      margin: 10px 5px;
      background: #007acc;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }
    button:hover {
      background: #005a9e;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      background: #252526;
      border: 1px solid #3e3e42;
      border-radius: 4px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .error {
      color: #f48771;
    }
    .success {
      color: #4ec9b0;
    }
    .hex-dump {
      font-size: 12px;
      line-height: 1.5;
    }
    input {
      width: 100%;
      padding: 8px;
      margin: 10px 0;
      background: #3c3c3c;
      border: 1px solid #3e3e42;
      color: #d4d4d4;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 Test Proxy Response</h1>
    <p>Esta herramienta descarga un fragmento .ts y muestra los primeros bytes en hexadecimal para verificar si es MPEG-TS válido.</p>
    
    <div>
      <label>URL del fragmento .ts (a través del proxy):</label>
      <input type="text" id="urlInput" placeholder="https://futbol-libre.vercel.app/api/proxy?url=...">
    </div>
    
    <button onclick="testFragment()">🧪 Probar Fragmento</button>
    <button onclick="testDirect()">🔗 Probar URL Directa (sin proxy)</button>
    <button onclick="clearResults()">🗑️ Limpiar</button>
    
    <div id="results"></div>
  </div>

  <script>
    function clearResults() {
      document.getElementById('results').innerHTML = '';
    }

    function hexDump(buffer, maxBytes = 256) {
      const bytes = new Uint8Array(buffer);
      const lines = [];
      const displayBytes = Math.min(bytes.length, maxBytes);
      
      for (let i = 0; i < displayBytes; i += 16) {
        const offset = i.toString(16).padStart(8, '0');
        const hexPart = [];
        const asciiPart = [];
        
        for (let j = 0; j < 16; j++) {
          const idx = i + j;
          if (idx < displayBytes) {
            const byte = bytes[idx];
            hexPart.push(byte.toString(16).padStart(2, '0'));
            asciiPart.push(byte >= 32 && byte <= 126 ? String.fromCharCode(byte) : '.');
          } else {
            hexPart.push('  ');
            asciiPart.push(' ');
          }
        }
        
        lines.push(`${offset}  ${hexPart.join(' ')}  |${asciiPart.join('')}|`);
      }
      
      if (bytes.length > maxBytes) {
        lines.push(`\n... (mostrando ${maxBytes} de ${bytes.length} bytes)`);
      }
      
      return lines.join('\n');
    }

    function validateMPEGTS(buffer) {
      const bytes = new Uint8Array(buffer);
      const results = [];
      
      // Verificar sync byte inicial
      if (bytes[0] === 0x47) {
        results.push('✅ Sync byte inicial correcto (0x47)');
      } else {
        results.push(`❌ Sync byte inicial incorrecto: 0x${bytes[0].toString(16).padStart(2, '0')} (esperado: 0x47)`);
      }
      
      // Verificar múltiples sync bytes cada 188 bytes
      const packetSize = 188;
      let syncCount = 0;
      const syncPositions = [];
      
      for (let i = 0; i < Math.min(bytes.length, packetSize * 20); i += packetSize) {
        if (bytes[i] === 0x47) {
          syncCount++;
          syncPositions.push(i);
        }
      }
      
      results.push(`\n📊 Sync bytes encontrados: ${syncCount} en posiciones: ${syncPositions.slice(0, 10).join(', ')}${syncPositions.length > 10 ? '...' : ''}`);
      
      if (syncCount >= 3) {
        results.push('✅ Estructura MPEG-TS válida (múltiples sync bytes)');
      } else {
        results.push('❌ Estructura MPEG-TS inválida (pocos sync bytes)');
      }
      
      // Verificar si parece HTML
      const text = new TextDecoder().decode(bytes.slice(0, 100));
      if (text.includes('<!DOCTYPE') || text.includes('<html') || text.includes('<body')) {
        results.push('❌ ¡ALERTA! El contenido parece ser HTML, no un fragmento de video');
      }
      
      // Verificar si parece JSON
      if (text.trim().startsWith('{') || text.trim().startsWith('[')) {
        results.push('❌ ¡ALERTA! El contenido parece ser JSON, no un fragmento de video');
      }
      
      return results.join('\n');
    }

    async function testFragment() {
      const url = document.getElementById('urlInput').value.trim();
      
      if (!url) {
        alert('Por favor ingresa una URL');
        return;
      }
      
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '<div class="result">⏳ Descargando fragmento...</div>';
      
      try {
        const startTime = performance.now();
        const response = await fetch(url);
        const endTime = performance.now();
        
        const buffer = await response.arrayBuffer();
        const contentType = response.headers.get('content-type');
        const contentLength = response.headers.get('content-length');
        const xCache = response.headers.get('x-cache');
        const xProxyBy = response.headers.get('x-proxy-by');
        
        const validation = validateMPEGTS(buffer);
        const hex = hexDump(buffer, 512);
        
        resultsDiv.innerHTML = `
          <div class="result success">
            <strong>✅ Respuesta recibida</strong>
            
            <h3>📋 Headers:</h3>
            Status: ${response.status} ${response.statusText}
            Content-Type: ${contentType || 'N/A'}
            Content-Length: ${contentLength || 'N/A'}
            Tamaño real: ${buffer.byteLength} bytes
            X-Cache: ${xCache || 'N/A'}
            X-Proxy-By: ${xProxyBy || 'N/A'}
            Tiempo de descarga: ${(endTime - startTime).toFixed(2)} ms
            
            <h3>🔍 Validación MPEG-TS:</h3>
            ${validation}
            
            <h3>📝 Hex Dump (primeros 512 bytes):</h3>
            <div class="hex-dump">${hex}</div>
          </div>
        `;
        
      } catch (error) {
        resultsDiv.innerHTML = `
          <div class="result error">
            <strong>❌ Error:</strong>
            ${error.message}
            
            Stack: ${error.stack}
          </div>
        `;
      }
    }

    async function testDirect() {
      const proxyUrl = document.getElementById('urlInput').value.trim();
      
      if (!proxyUrl) {
        alert('Por favor ingresa una URL del proxy primero');
        return;
      }
      
      // Extraer la URL original del parámetro
      const urlMatch = proxyUrl.match(/[?&]url=([^&]+)/);
      if (!urlMatch) {
        alert('No se pudo extraer la URL original del proxy');
        return;
      }
      
      const directUrl = decodeURIComponent(urlMatch[1]);
      
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '<div class="result">⏳ Descargando desde URL directa (puede fallar por CORS)...</div>';
      
      try {
        const startTime = performance.now();
        const response = await fetch(directUrl);
        const endTime = performance.now();
        
        const buffer = await response.arrayBuffer();
        const contentType = response.headers.get('content-type');
        const contentLength = response.headers.get('content-length');
        
        const validation = validateMPEGTS(buffer);
        const hex = hexDump(buffer, 512);
        
        resultsDiv.innerHTML = `
          <div class="result success">
            <strong>✅ Respuesta directa recibida</strong>
            
            <h3>🔗 URL Directa:</h3>
            ${directUrl}
            
            <h3>📋 Headers:</h3>
            Status: ${response.status} ${response.statusText}
            Content-Type: ${contentType || 'N/A'}
            Content-Length: ${contentLength || 'N/A'}
            Tamaño real: ${buffer.byteLength} bytes
            Tiempo de descarga: ${(endTime - startTime).toFixed(2)} ms
            
            <h3>🔍 Validación MPEG-TS:</h3>
            ${validation}
            
            <h3>📝 Hex Dump (primeros 512 bytes):</h3>
            <div class="hex-dump">${hex}</div>
          </div>
        `;
        
      } catch (error) {
        resultsDiv.innerHTML = `
          <div class="result error">
            <strong>❌ Error (esperado por CORS):</strong>
            ${error.message}
            
            <p>Esto es normal si el servidor no permite CORS. El proxy debería resolver esto.</p>
          </div>
        `;
      }
    }
    
    // Auto-llenar con la última URL del error si está disponible
    window.addEventListener('load', () => {
      const lastUrl = 'https://futbol-libre.vercel.app/api/proxy?url=https%3A%2F%2Fag9wzq.fubohd.com%3A443%2Fespn%2F2026%2F03%2F19%2F17%2F08%2F48-06006.ts%3Ftoken%3D6985e49cdaf35a19437e04cc2f3699bb9afd7cd7-1b-1773957223-1773939223';
      document.getElementById('urlInput').value = lastUrl;
    });
  </script>
</body>
</html>
